<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>決済完了 | MAISON VEIL</title>
<style>
  body{
    font-family: -apple-system, BlinkMacSystemFont, "Helvetica Neue", Arial, sans-serif;
    background:#fff;
    color:#111;
    display:flex;
    align-items:center;
    justify-content:center;
    min-height:100vh;
    margin:0;
    text-align:center;
    padding:20px;
  }
  .box{ max-width: 480px; }
  h1{ font-size: 24px; margin-bottom: 12px; }
  p{ font-size: 15px; color:#555; line-height:1.6; }
  a{
    display:inline-block;
    margin-top: 24px;
    color:#111;
    text-decoration:underline;
    font-size:14px;
  }
  .voucher-btn{
    display:inline-block;
    margin-top: 20px;
    padding: 12px 24px;
    background:#111;
    color:#fff;
    text-decoration:none;
    font-size:14px;
    letter-spacing: 0.05em;
  }
  .loading{ color:#999; font-size:14px; }
</style>
</head>
<body>
  <div class="box" id="content">
    <p class="loading">ご注文情報を確認しています...</p>
  </div>

  <script>
    (async function () {
      const params = new URLSearchParams(window.location.search);
      const sessionId = params.get('session_id');
      const contentEl = document.getElementById('content');

      if (!sessionId) {
        contentEl.innerHTML = `
          <h1>ご購入ありがとうございます</h1>
          <p>決済が正常に完了しました。<br>ご注文の確認メールをStripeより送信しています。</p>
          <a href="/">トップページに戻る</a>
        `;
        return;
      }

      try {
        const res = await fetch(`/api/get-session-status?session_id=${encodeURIComponent(sessionId)}`);
        const data = await res.json();

        if (!res.ok) throw new Error(data.error || '取得失敗');

        if (data.payment_status === 'paid') {
          // card / paypay など、支払い済み
          contentEl.innerHTML = `
            <h1>ご購入ありがとうございます</h1>
            <p>決済が正常に完了しました。<br>ご注文の確認メールをStripeより送信しています。</p>
            <a href="/">トップページに戻る</a>
          `;
        } else if (data.payment_method_type === 'konbini') {
          // konbini: まだ店頭で支払われていない状態
          const expiresDate = data.konbini && data.konbini.expires_at
            ? new Date(data.konbini.expires_at * 1000).toLocaleString('ja-JP', {
                year: 'numeric', month: 'long', day: 'numeric', hour: '2-digit', minute: '2-digit'
              })
            : null;

          contentEl.innerHTML = `
            <h1>ご注文を受け付けました</h1>
            <p>コンビニでのお支払いをお願いいたします。<br>
            以下のリンクから支払い方法の詳細(店舗・支払いコード)をご確認ください。</p>
            ${data.konbini && data.konbini.hosted_voucher_url
              ? `<a class="voucher-btn" href="${data.konbini.hosted_voucher_url}" target="_blank" rel="noopener">支払い方法を確認する</a>`
              : ''}
            ${expiresDate ? `<p>お支払い期限: ${expiresDate}</p>` : ''}
            <p style="margin-top:16px;">支払い完了後、自動的に発送準備に進みます。<br>ご不明な点があればメールにてお問い合わせください。</p>
            <a href="/">トップページに戻る</a>
          `;
        } else {
          // それ以外の非同期決済、または不明な状態
          contentEl.innerHTML = `
            <h1>ご注文を受け付けました</h1>
            <p>お支払いの確認が完了次第、発送準備に進みます。<br>ご注文の確認メールをご確認ください。</p>
            <a href="/">トップページに戻る</a>
          `;
        }
      } catch (err) {
        console.error(err);
        contentEl.innerHTML = `
          <h1>ご注文を受け付けました</h1>
          <p>ご注文の確認メールをご確認ください。<br>表示に問題がある場合はお手数ですがメールにてお問い合わせください。</p>
          <a href="/">トップページに戻る</a>
        `;
      }
    })();
  </script>
</body>
</html>
